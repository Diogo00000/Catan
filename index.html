<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catan — Island of the Pass-and-Play</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --sea:#11414c; --sea-deep:#0b2c34; --sea-glow:#1c5e6c;
    --parchment:#f3e7cd; --parchment-2:#ece0c2; --parchment-edge:#d8c49a;
    --wood:#6b4f2e; --wood-dark:#3a2a1a; --ink:#2c2117; --ink-soft:#5d4e3c;
    --gold:#e0b84a; --gold-deep:#b8902c;
    --t-wood:#2f6b3c; --t-brick:#bf6138; --t-sheep:#a8c459; --t-wheat:#e3b23c; --t-ore:#74808d; --t-desert:#d9c08c;
    --red-num:#b23a2e; --robber:#2b2b2b;
    --p0:#c0392b; --p1:#2f74b5; --p2:#df8a2c; --p3:#efe9dc;
    --shadow:0 10px 30px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{
    font-family:'Outfit',system-ui,-apple-system,sans-serif;
    color:var(--ink);
    background:
      radial-gradient(120% 100% at 30% 0%, var(--sea-glow) 0%, var(--sea) 42%, var(--sea-deep) 100%);
    min-height:100%;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{
    max-width:1180px; margin:0 auto; padding:18px 18px 40px;
    display:flex; gap:20px; align-items:flex-start;
  }
  /* ---------- Board ---------- */
  .board-card{
    flex:1 1 auto; min-width:0;
    background:linear-gradient(160deg,#0f3a44,#0c3038);
    border:1px solid rgba(224,184,74,.25);
    border-radius:14px; padding:10px;
    box-shadow:var(--shadow);
  }
  svg#board{display:block; width:100%; height:auto;}
  .hex-poly{stroke:rgba(20,30,20,.45); stroke-width:1.4; cursor:default;}
  .tok-circle{fill:var(--parchment); stroke:#9c8554; stroke-width:1.4;}
  .tok-text{font-family:'Cinzel',Georgia,serif; font-weight:700; text-anchor:middle; dominant-baseline:central; fill:var(--ink);}
  .tok-text.red{fill:var(--red-num);}
  .res-label{font-family:'Outfit',sans-serif; font-weight:600; font-size:9.5px; letter-spacing:1.5px;
    text-anchor:middle; fill:rgba(28,22,14,.55); text-transform:uppercase; pointer-events:none;}
  .road-line{stroke-linecap:round;}
  .piece{stroke:var(--wood-dark); stroke-width:1.6; stroke-linejoin:round;}
  .cand{cursor:pointer;}
  .cand-dot{fill:rgba(224,184,74,.85); stroke:#fff; stroke-width:1.6;}
  .cand-road{stroke:var(--gold); stroke-width:7; stroke-linecap:round; stroke-dasharray:2 6; opacity:.95;}
  .cand-hex{fill:rgba(224,184,74,.18); stroke:var(--gold); stroke-width:3; stroke-dasharray:6 5;}
  .cand-ring{fill:none; stroke:var(--gold); stroke-width:3.5;}
  @media (prefers-reduced-motion: no-preference){
    .pulse{animation:pulse 1.25s ease-in-out infinite;}
    @keyframes pulse{0%,100%{opacity:.55;} 50%{opacity:1;}}
  }
  .compass text{font-family:'Cinzel',serif; fill:rgba(224,184,74,.7); font-size:11px; text-anchor:middle; dominant-baseline:central;}

  /* ---------- Panel ---------- */
  .panel{
    flex:0 0 348px; width:348px;
    background:linear-gradient(175deg,var(--parchment),var(--parchment-2));
    border:1px solid var(--parchment-edge);
    border-radius:14px; box-shadow:var(--shadow);
    overflow:hidden;
  }
  .panel-head{
    padding:16px 18px 12px; border-bottom:1px solid rgba(107,79,46,.22);
    display:flex; align-items:baseline; justify-content:space-between;
    background:linear-gradient(180deg, rgba(107,79,46,.10), transparent);
  }
  .title{font-family:'Cinzel',Georgia,serif; font-weight:700; font-size:26px; letter-spacing:5px; margin:0; color:var(--wood-dark);}
  .title .small{display:block; font-family:'Outfit',sans-serif; font-weight:500; font-size:9.5px; letter-spacing:3px; color:var(--ink-soft); text-transform:uppercase; margin-top:2px;}
  .btn-ghost{
    font-family:'Outfit',sans-serif; font-size:11px; letter-spacing:.5px; cursor:pointer;
    background:transparent; color:var(--ink-soft); border:1px solid rgba(107,79,46,.35);
    border-radius:8px; padding:6px 10px;
  }
  .btn-ghost:hover{background:rgba(107,79,46,.10);}
  .section{padding:14px 18px;}
  .section + .section{border-top:1px solid rgba(107,79,46,.16);}

  /* Dice */
  .dice-row{display:flex; align-items:center; gap:14px;}
  .dice{display:flex; gap:10px;}
  .die{width:42px; height:42px; background:#fbf4e4; border:1px solid #c9b489; border-radius:9px;
    display:grid; grid-template-columns:repeat(3,1fr); grid-template-rows:repeat(3,1fr);
    padding:6px; box-shadow:inset 0 -3px 6px rgba(0,0,0,.06);}
  .pip{width:7px; height:7px; border-radius:50%; align-self:center; justify-self:center; background:transparent;}
  .pip.on{background:var(--ink);}
  .sum{font-family:'Cinzel',serif; font-weight:700; font-size:30px; color:var(--wood-dark); min-width:34px; text-align:center;}
  .sum small{display:block; font-family:'Outfit',sans-serif; font-weight:500; font-size:9px; letter-spacing:1.5px; color:var(--ink-soft); text-transform:uppercase;}

  /* Players */
  .players{display:flex; flex-direction:column; gap:9px;}
  .pcard{display:flex; align-items:center; gap:10px; padding:9px 10px; border-radius:10px;
    border:1px solid rgba(107,79,46,.18); background:rgba(255,255,255,.30);}
  .pcard.active{border-color:var(--gold-deep); background:rgba(224,184,74,.18); box-shadow:0 0 0 1px var(--gold-deep) inset;}
  .swatch{width:18px; height:18px; border-radius:5px; border:1.5px solid var(--wood-dark); flex:0 0 auto;}
  .pname{font-weight:600; font-size:13px; flex:0 0 auto; min-width:48px;}
  .vp{margin-left:auto; font-family:'Cinzel',serif; font-weight:700; font-size:13px; color:var(--wood-dark);
    background:rgba(107,79,46,.12); border-radius:20px; padding:2px 9px;}
  .vp small{font-family:'Outfit',sans-serif; font-weight:500; font-size:9px;}
  .res-chips{display:flex; gap:5px; flex-wrap:wrap; margin-top:7px;}
  .chip{display:flex; align-items:center; gap:4px; font-size:11px; font-weight:600; color:#fff;
    border-radius:6px; padding:2px 6px; line-height:1.4;}
  .chip .c-lab{font-weight:500; font-size:8.5px; letter-spacing:.5px; opacity:.85; text-transform:uppercase;}
  .pcard-body{flex:1 1 100%;}
  .prow{display:flex; align-items:center; gap:10px;}
  .pstats{display:flex; flex-wrap:wrap; gap:9px; margin-top:7px; font-size:10.5px; color:var(--ink-soft); align-items:center;}
  .pstats span{display:inline-flex; align-items:center; gap:3px;}
  .pstats b{font-family:'Cinzel',serif; color:var(--wood-dark); font-weight:700; font-size:11.5px;}
  .award{font-size:8px; letter-spacing:.5px; text-transform:uppercase; font-weight:700; color:var(--wood-dark);
    background:rgba(224,184,74,.4); border:1px solid var(--gold-deep); border-radius:20px; padding:1px 6px; white-space:nowrap;}

  /* Actions */
  .prompt{font-size:13px; line-height:1.5; color:var(--ink); background:rgba(107,79,46,.10);
    border-left:3px solid var(--gold-deep); border-radius:6px; padding:9px 11px; min-height:38px;}
  .actions{display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:12px;}
  .btn{font-family:'Outfit',sans-serif; font-weight:600; font-size:12.5px; cursor:pointer;
    border:1px solid var(--wood-dark); border-radius:9px; padding:9px 8px; color:var(--parchment);
    background:linear-gradient(180deg,#7a5a34,#5e4527); transition:transform .05s, filter .15s;}
  .btn:hover:not(:disabled){filter:brightness(1.08);}
  .btn:active:not(:disabled){transform:translateY(1px);}
  .btn:disabled{opacity:.4; cursor:not-allowed;}
  .btn.primary{background:linear-gradient(180deg,var(--gold),var(--gold-deep)); color:var(--wood-dark); border-color:var(--gold-deep);}
  .btn.span2{grid-column:span 2;}
  .btn .cost{display:block; font-weight:400; font-size:9px; letter-spacing:.3px; opacity:.85; margin-top:1px;}
  .btn.cancel{background:transparent; color:#9c3b30; border-color:#9c3b30;}
  .bot-tip{background:transparent; border:0; color:var(--ink-soft); font-weight:500; cursor:default; font-size:12px;
    text-align:center; padding:4px 0;}

  /* Auto-play bar */
  #autoSection{display:none;}
  .autobar{display:flex; flex-wrap:wrap; align-items:center; gap:8px;}
  .seg-group{display:inline-flex; border:1px solid rgba(107,79,46,.35); border-radius:8px; overflow:hidden;}
  .seg{font-family:'Outfit',sans-serif; font-size:11px; cursor:pointer; background:rgba(255,255,255,.30);
    border:0; padding:6px 11px; color:var(--ink); border-right:1px solid rgba(107,79,46,.22);}
  .seg:last-child{border-right:0;}
  .seg:hover:not(.sel){background:rgba(107,79,46,.10);}
  .seg.sel{background:linear-gradient(180deg,var(--gold),var(--gold-deep)); color:var(--wood-dark); font-weight:700;}
  #pauseBtn{border:1px solid rgba(107,79,46,.35); border-radius:8px;}
  .spd-lab{font-size:9px; letter-spacing:1.2px; text-transform:uppercase; color:var(--ink-soft);}
  .auto-status{flex:1 1 100%; font-size:10.5px; color:var(--ink-soft); font-style:italic;}
  .seat-type{font-family:'Outfit',sans-serif; font-size:11px; font-weight:600; cursor:pointer; flex:0 0 auto;
    border:1px solid rgba(107,79,46,.35); border-radius:8px; padding:7px 8px; background:rgba(255,255,255,.35);
    color:var(--ink); white-space:nowrap;}
  .seat-type:hover{background:rgba(107,79,46,.12);}
  .seat-type.bot{background:rgba(47,116,181,.18); border-color:#2f74b5;}
  .watch-row{display:flex; align-items:center; gap:8px; margin:2px 0 14px; font-size:12.5px; color:var(--ink); cursor:pointer;}
  .watch-row input{width:16px; height:16px; cursor:pointer;}

  /* Log */
  .log{font-size:11.5px; line-height:1.6; color:var(--ink-soft); max-height:108px; overflow-y:auto;}
  .log div{padding:1px 0;}
  .log .now{color:var(--ink); font-weight:600;}

  /* Overlay */
  .overlay{position:fixed; inset:0; display:flex; align-items:center; justify-content:center; padding:20px;
    background:radial-gradient(120% 100% at 50% 0%, rgba(28,94,108,.6), rgba(11,44,52,.82)); z-index:50;}
  .overlay.hidden{display:none;}
  .modal{background:linear-gradient(175deg,var(--parchment),var(--parchment-2)); border:1px solid var(--parchment-edge);
    border-radius:16px; box-shadow:var(--shadow); padding:30px 34px; max-width:430px; text-align:center;}
  .modal h1{font-family:'Cinzel',serif; font-weight:700; letter-spacing:6px; font-size:38px; margin:0 0 4px; color:var(--wood-dark);}
  .modal .sub{font-size:12px; letter-spacing:2px; text-transform:uppercase; color:var(--ink-soft); margin-bottom:18px;}
  .modal p{font-size:13px; line-height:1.6; color:var(--ink); margin:0 auto 20px; max-width:330px;}
  .choose{display:flex; gap:10px; justify-content:center; margin-bottom:8px;}
  .choose .btn{padding:13px 18px; font-size:14px;}
  .winner-swatch{display:inline-block; width:14px; height:14px; border-radius:4px; border:1.5px solid var(--wood-dark); vertical-align:middle; margin-right:6px;}

  /* ---------- Setup screen ---------- */
  .setup{text-align:left;}
  .setup-row{display:flex; align-items:center; gap:12px; margin-bottom:14px;}
  .setup-lab{font-family:'Cinzel',serif; font-weight:600; font-size:13px; letter-spacing:2px;
    text-transform:uppercase; color:var(--wood-dark); flex:0 0 auto;}
  .count-btns{display:flex; gap:7px;}
  .count-btn{font-family:'Outfit',sans-serif; font-weight:600; font-size:14px; cursor:pointer;
    width:38px; height:38px; border-radius:9px; border:1px solid rgba(107,79,46,.35);
    background:rgba(255,255,255,.35); color:var(--ink);}
  .count-btn:hover{background:rgba(107,79,46,.12);}
  .count-btn.sel{background:linear-gradient(180deg,var(--gold),var(--gold-deep));
    color:var(--wood-dark); border-color:var(--gold-deep);}
  .seats{display:flex; flex-direction:column; gap:8px; margin-bottom:16px;}
  .seat{display:flex; align-items:center; gap:9px;}
  .seat-num{font-family:'Cinzel',serif; font-weight:700; font-size:12px; color:var(--ink-soft);
    width:16px; flex:0 0 auto; text-align:right;}
  .seat-name{flex:1 1 auto; min-width:0; font-family:'Outfit',sans-serif; font-size:13px; color:var(--ink);
    border:1px solid rgba(107,79,46,.35); border-radius:8px; padding:8px 10px; background:rgba(255,255,255,.55);}
  .seat-name:focus{outline:none; border-color:var(--gold-deep); box-shadow:0 0 0 2px rgba(224,184,74,.3);}
  .seat-name.invalid{border-color:#9c3b30;}
  .swatches{display:flex; gap:5px; flex:0 0 auto;}
  .sw{width:22px; height:22px; border-radius:6px; border:1.5px solid var(--wood-dark); cursor:pointer;
    padding:0; position:relative; transition:transform .08s;}
  .sw:hover:not(:disabled){transform:scale(1.12);}
  .sw.sel{box-shadow:0 0 0 2px var(--parchment), 0 0 0 4px var(--gold-deep);}
  .sw:disabled{cursor:not-allowed; opacity:.28;}
  #startBtn:disabled{opacity:.4; cursor:not-allowed;}

  /* ---------- Trade dialog ---------- */
  .harbour-line{font-size:10px; color:var(--ink-soft); margin-top:5px; letter-spacing:.3px;}
  .trade-modal{width:430px; max-width:92vw; text-align:left; padding:22px 24px;}
  .trade-head{display:flex; align-items:baseline; justify-content:space-between; gap:10px; margin-bottom:6px;}
  .trade-head h2{font-family:'Cinzel',serif; font-weight:700; letter-spacing:2px; font-size:22px; margin:0; color:var(--wood-dark);}
  .trade-who{font-size:11px; letter-spacing:1px; text-transform:uppercase; color:var(--ink-soft); white-space:nowrap;}
  .trade-intro{font-size:12.5px; line-height:1.5; color:var(--ink); margin:0 0 14px; max-width:none;}
  .trade-menu{display:flex; flex-direction:column; gap:9px; margin-bottom:14px;}
  .trade-opt{display:flex; flex-direction:column; align-items:flex-start; gap:2px; text-align:left;
    font-family:'Outfit',sans-serif; cursor:pointer; padding:11px 14px; border-radius:10px;
    border:1px solid rgba(107,79,46,.35); background:rgba(255,255,255,.4); color:var(--ink);}
  .trade-opt:hover:not(:disabled){background:rgba(224,184,74,.18); border-color:var(--gold-deep);}
  .trade-opt:disabled{opacity:.45; cursor:not-allowed;}
  .to-title{font-weight:700; font-size:14px; color:var(--wood-dark); letter-spacing:.5px;}
  .to-sub{font-size:11px; color:var(--ink-soft);}
  .trade-block{margin-bottom:12px;}
  .tb-lab{font-size:10.5px; letter-spacing:1px; text-transform:uppercase; color:var(--ink-soft); font-weight:600; margin-bottom:6px;}
  .res-grid{display:grid; grid-template-columns:repeat(5,1fr); gap:6px;}
  .res-cell{display:flex; flex-direction:column; align-items:center; gap:2px; cursor:pointer;
    border:2px solid transparent; border-radius:8px; padding:7px 2px 5px; background:var(--rc);
    font-family:'Outfit',sans-serif;}
  .res-cell:disabled{opacity:.32; cursor:not-allowed;}
  .res-cell.sel{border-color:var(--wood-dark); box-shadow:0 0 0 2px var(--gold);}
  .rc-name{font-weight:700; font-size:11px;}
  .rc-sub{font-size:8px; opacity:.92; line-height:1.15; text-align:center;}
  .trade-summary{font-size:12.5px; color:var(--ink); background:rgba(107,79,46,.10);
    border-left:3px solid var(--gold-deep); border-radius:6px; padding:8px 11px; margin-bottom:14px;}
  .trade-ports{font-size:11px; color:var(--ink-soft); margin-bottom:12px;}
  .trade-foot{display:flex; gap:8px; justify-content:flex-end; flex-wrap:wrap;}
  .trade-foot .btn{padding:9px 14px;}
  .partners{display:flex; flex-wrap:wrap; gap:7px;}
  .partner{display:flex; align-items:center; gap:6px; cursor:pointer; font-family:'Outfit',sans-serif;
    font-size:12px; font-weight:600; color:var(--ink); padding:6px 10px; border-radius:8px;
    border:1px solid rgba(107,79,46,.35); background:rgba(255,255,255,.4);}
  .partner:hover{background:rgba(224,184,74,.18);}
  .partner.sel{border-color:var(--gold-deep); background:rgba(224,184,74,.22); box-shadow:0 0 0 1px var(--gold-deep) inset;}
  .pswatch{width:14px; height:14px; border-radius:4px; border:1.5px solid var(--wood-dark);}
  .pcards{font-size:10px; color:var(--ink-soft);}
  .steppers{display:grid; grid-template-columns:repeat(5,1fr); gap:6px;}
  .stepper{display:flex; flex-direction:column; align-items:center; gap:4px;}
  .st-swatch{width:100%; text-align:center; font-size:9.5px; font-weight:700; border-radius:6px; padding:3px 0;}
  .st-ctl{display:flex; align-items:center; gap:4px;}
  .st-ctl button{width:20px; height:20px; border-radius:6px; border:1px solid rgba(107,79,46,.4);
    background:rgba(255,255,255,.6); cursor:pointer; font-size:13px; line-height:1; color:var(--ink);}
  .st-ctl button:disabled{opacity:.3; cursor:not-allowed;}
  .st-val{font-family:'Cinzel',serif; font-weight:700; font-size:13px; min-width:14px; text-align:center;}
  .st-max{font-size:9px; color:var(--ink-soft);}
  .stepper-hint{font-size:12px; color:var(--ink-soft); font-style:italic; padding:6px 0;}
  .offer-card{background:rgba(255,255,255,.4); border:1px solid rgba(107,79,46,.25); border-radius:10px;
    padding:12px 14px; margin-bottom:16px;}
  .offer-row{display:flex; justify-content:space-between; gap:10px; font-size:13px; padding:4px 0;}
  .offer-side{font-weight:700;}
  .offer-arrow{text-align:center; color:var(--gold-deep); font-size:16px;}

  @media (max-width:880px){
    .wrap{flex-direction:column;}
    .panel{flex:1 1 auto; width:100%;}
  }
</style>
</head>
<body>

<div class="wrap">
  <div class="board-card">
    <svg id="board" viewBox="0 0 600 590" role="img" aria-label="Catan board"></svg>
  </div>

  <aside class="panel">
    <div class="panel-head">
      <h1 class="title">CATAN<span class="small">Pass &amp; Play Island</span></h1>
      <button class="btn-ghost" id="newGameBtn">New game</button>
    </div>

    <div class="section">
      <div class="dice-row">
        <div class="dice" id="dice"></div>
        <div class="sum" id="sum">–<small>Roll</small></div>
      </div>
    </div>

    <div class="section" id="autoSection">
      <div class="autobar">
        <span class="spd-lab">Mode</span>
        <div class="seg-group">
          <button class="seg" id="modeManual">Manual</button>
          <button class="seg" id="modeAuto">Auto · watch</button>
        </div>
        <button class="seg" id="pauseBtn">Pause</button>
        <span class="spd-lab">Speed</span>
        <div class="seg-group" id="spdGroup">
          <button class="seg spd" data-ms="1100">Slow</button>
          <button class="seg spd" data-ms="550">Normal</button>
          <button class="seg spd" data-ms="220">Fast</button>
        </div>
        <div class="auto-status" id="autoStatus"></div>
      </div>
    </div>

    <div class="section">
      <div class="players" id="players"></div>
    </div>

    <div class="section">
      <div class="prompt" id="prompt">Welcome to the island.</div>
      <div class="actions" id="actions"></div>
    </div>

    <div class="section">
      <div class="log" id="log"></div>
    </div>
  </aside>
</div>

<!-- Start / End overlay -->
<div class="overlay" id="overlay">
  <div class="modal" id="modal">
    <h1>CATAN</h1>
    <div class="sub">Settlers of the Island</div>
    <p>Collect wood, brick, sheep, wheat and ore. Build settlements and roads, upgrade to cities, and race to <strong>10 victory points</strong>. Played hot-seat — pass the screen between turns.</p>
    <div class="setup" id="setup">
      <div class="setup-row">
        <span class="setup-lab">Players</span>
        <div class="count-btns" id="countBtns"></div>
      </div>
      <div class="seats" id="seats"></div>
      <label class="watch-row"><input type="checkbox" id="watchStart"><span>Auto-watch mode — let every seat play itself while I watch</span></label>
      <button class="btn primary span2" id="startBtn" onclick="startGame()">Start game</button>
    </div>
  </div>
</div>

<!-- Trade dialog -->
<div class="overlay hidden" id="tradeOverlay">
  <div class="modal trade-modal" id="tradeModal"></div>
</div>

<!-- Discard dialog (when a 7 is rolled) -->
<div class="overlay hidden" id="discardOverlay">
  <div class="modal trade-modal" id="discardModal"></div>
</div>

<!-- Steal-target dialog (when several rivals border the robber's hex) -->
<div class="overlay hidden" id="stealOverlay">
  <div class="modal trade-modal" id="stealModal"></div>
</div>

<!-- Play development card dialog -->
<div class="overlay hidden" id="devOverlay">
  <div class="modal trade-modal" id="devModal"></div>
</div>

<script>
"use strict";
const SVGNS="http://www.w3.org/2000/svg";
const el=(tag,attrs={},parent)=>{const e=document.createElementNS(SVGNS,tag);for(const k in attrs)e.setAttribute(k,attrs[k]);if(parent)parent.appendChild(e);return e;};

/* ---------------- Static data ---------------- */

const RES_LABEL={wood:"Wood",brick:"Brick",sheep:"Sheep",wheat:"Wheat",ore:"Ore"};
const RES_ORDER=["wood","brick","sheep","wheat","ore"];
const RES_SHORT={wood:"Wood",brick:"Brick",sheep:"Sheep",wheat:"Wheat",ore:"Ore"};

/* ---------------- Board geometry ---------------- */
const R=48, W=Math.sqrt(3)*R, VD=1.5*R, CX0=300, CY0=295;
const COUNTS_SMALL=[3,4,5,4,3];        // 19-hex board (3-4 players)
const COUNTS_LARGE=[3,4,5,6,5,4,3];    // 30-hex 5-6 extension board (5-6 players)
let COUNTS=COUNTS_SMALL;
let hexes=[], vertices=[], edges=[], harbours=[];

function buildGeometry(){
  hexes=[]; vertices=[]; edges=[];
  const vmap=new Map(), emap=new Map();
  const vkey=(x,y)=>Math.round(x)+","+Math.round(y);
  const ekey=(a,b)=>a<b?a+"-"+b:b+"-"+a;
  const getV=(x,y)=>{const k=vkey(x,y);if(vmap.has(k))return vmap.get(k);
    const v={id:vertices.length,x,y,hexes:[],edges:[],adj:[]};vertices.push(v);vmap.set(k,v);return v;};
  const getE=(a,b,hi)=>{const k=ekey(a,b);
    if(emap.has(k)){const e=emap.get(k);if(!e.hexes.includes(hi))e.hexes.push(hi);return e;}
    const e={id:edges.length,v1:Math.min(a,b),v2:Math.max(a,b),hexes:[hi]};edges.push(e);emap.set(k,e);return e;};
  COUNTS.forEach((count,row)=>{
    const y=CY0+(row-(COUNTS.length-1)/2)*VD, xStart=CX0-(count-1)/2*W;
    for(let i=0;i<count;i++) hexes.push({cx:xStart+i*W,cy:y,corners:[],edgeIds:[]});
  });
  hexes.forEach((h,hi)=>{
    for(let k=0;k<6;k++){
      const ang=(-90+60*k)*Math.PI/180;
      const v=getV(h.cx+R*Math.cos(ang),h.cy+R*Math.sin(ang));
      h.corners.push(v.id); v.hexes.push(hi);
    }
    for(let k=0;k<6;k++){
      const a=h.corners[k], b=h.corners[(k+1)%6];
      const e=getE(a,b,hi); h.edgeIds.push(e.id);
    }
  });
  edges.forEach(e=>{
    vertices[e.v1].edges.push(e.id); vertices[e.v2].edges.push(e.id);
    vertices[e.v1].adj.push(e.v2); vertices[e.v2].adj.push(e.v1);
  });
}

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function assignTiles(){
  let bag, nums;
  if(hexes.length===30){
    // 5-6 extension board: 6 wood, 6 sheep, 6 wheat, 5 brick, 5 ore, 2 desert
    bag=shuffle([...Array(6).fill("wood"),...Array(6).fill("sheep"),...Array(6).fill("wheat"),
      ...Array(5).fill("brick"),...Array(5).fill("ore"),...Array(2).fill("desert")]);
    // 28 number tokens: two each of 2 & 12, three each of 3,4,5,6,8,9,10,11
    nums=shuffle([2,2,12,12,3,3,3,4,4,4,5,5,5,6,6,6,8,8,8,9,9,9,10,10,10,11,11,11]);
  } else {
    // standard 19-hex board
    bag=shuffle([...Array(4).fill("wood"),...Array(3).fill("brick"),...Array(4).fill("sheep"),
      ...Array(4).fill("wheat"),...Array(3).fill("ore"),"desert"]);
    nums=shuffle([2,3,3,4,4,5,5,6,6,8,8,9,9,10,10,11,11,12]);
  }
  let ni=0; const deserts=[];
  hexes.forEach((h,i)=>{
    h.resource=bag[i];
    if(h.resource==="desert"){h.number=null; deserts.push(i);}
    else h.number=nums[ni++];
  });
  // robber starts on a desert (one of the two on the large board)
  return deserts[Math.floor(Math.random()*deserts.length)];
}

/* Place harbours (ports) on coastal boundary edges, spread around the coast.
   type "3:1" = generic; a resource name = 2:1 for that resource. */
function assignHarbours(){
  harbours=[];
  // boundary edges = edges touching only one hex; order them around the coast by angle
  const boundary=edges.filter(e=>e.hexes.length===1).map(e=>{
    const a=vertices[e.v1], b=vertices[e.v2];
    const mx=(a.x+b.x)/2, my=(a.y+b.y)/2;
    return {e, ang:Math.atan2(my-CY0,mx-CX0)};
  }).sort((p,q)=>p.ang-q.ang);
  let types;
  if(hexes.length===30){
    // 30-hex board: 5 generic 3:1 and 6 specific 2:1 (wheat repeated)
    types=["3:1","3:1","3:1","3:1","3:1","wood","brick","sheep","wheat","ore","wheat"];
  } else {
    // 19-hex board: 4 generic 3:1 and 5 specific 2:1 (one of each resource)
    types=["3:1","3:1","3:1","3:1","wood","brick","sheep","wheat","ore"];
  }
  shuffle(types);
  const n=types.length, step=boundary.length/n;
  for(let i=0;i<n;i++){
    const e=boundary[Math.floor(i*step)].e;
    harbours.push({edge:e.id, v1:e.v1, v2:e.v2, type:types[i]});
  }
}

/* ---------------- Game state ---------------- */
let S=null;
const $=id=>document.getElementById(id);

/* ---------------- Pre-game setup screen ---------------- */
const setupState={count:4, players:[]};
function firstFreeColor(taken){ return (PALETTE.find(c=>!taken.includes(c.hex))||PALETTE[0]).hex; }
function defaultSeat(taken,i){ return {name:"Player "+(i+1), color:firstFreeColor(taken), type:"human"}; }
function ensureSeats(){
  const ps=setupState.players;
  while(ps.length<setupState.count) ps.push(defaultSeat(ps.map(p=>p.color),ps.length));
  ps.length=setupState.count;
}
function setupValid(){
  const ps=setupState.players.slice(0,setupState.count);
  if(ps.length<3||ps.length>6) return false;
  if(!ps.every(p=>p.name.trim().length>0)) return false;
  const cols=ps.map(p=>p.color);
  return cols.every(Boolean) && new Set(cols).size===cols.length;
}
function refreshStartBtn(){ const b=$("startBtn"); if(b) b.disabled=!setupValid(); }
function renderSetup(){
  ensureSeats();
  // player-count buttons
  const cb=$("countBtns"); cb.innerHTML="";
  [3,4,5,6].forEach(n=>{
    const b=document.createElement("button");
    b.className="count-btn"+(setupState.count===n?" sel":""); b.textContent=n;
    b.addEventListener("click",()=>{ setupState.count=n; renderSetup(); });
    cb.appendChild(b);
  });
  // one row per seat: name input + colour swatches
  const seats=$("seats"); seats.innerHTML="";
  const taken=setupState.players.slice(0,setupState.count).map(p=>p.color);
  setupState.players.slice(0,setupState.count).forEach((seat,i)=>{
    const row=document.createElement("div"); row.className="seat";
    const num=document.createElement("span"); num.className="seat-num"; num.textContent=(i+1);

    inp.setAttribute("aria-label","Player "+(i+1)+" name");
    inp.addEventListener("input",()=>{
      seat.name=inp.value;
      inp.classList.toggle("invalid",!inp.value.trim());
      refreshStartBtn();
    });
    const sws=document.createElement("div"); sws.className="swatches";
    PALETTE.forEach(c=>{
      const sw=document.createElement("button");
      sw.className="sw"+(seat.color===c.hex?" sel":"");
      sw.style.background=c.hex; sw.title=c.name;
      sw.setAttribute("aria-label",c.name);
      // disable colours already taken by another seat
      sw.disabled = (seat.color!==c.hex && taken.includes(c.hex));
      sw.addEventListener("click",()=>{ seat.color=c.hex; renderSetup(); });
      sws.appendChild(sw);
    });
    const tbtn=document.createElement("button");
    tbtn.type="button";
    tbtn.className="seat-type"+(seat.type==="bot"?" bot":"");

    row.appendChild(num); row.appendChild(inp); row.appendChild(sws); row.appendChild(tbtn);
    seats.appendChild(row);
  });

}

function startGame(){
  if(!setupValid()) return;
  const seats=setupState.players.slice(0,setupState.count);
  const n=seats.length;
  PLAYER_NAMES=seats.map(s=>s.name.trim());
  PLAYER_COLORS=seats.map(s=>s.color);
  PLAYER_TYPES=seats.map(s=>s.type||"human");
  watchMode=!!($("watchStart")&&$("watchStart").checked);
  watchPendingOff=false; paused=false; clearTimeout(botTimer);
  $("autoSection").style.display="block";
  COUNTS=(n>=5)?COUNTS_LARGE:COUNTS_SMALL;   // larger board for 5-6 players
  buildGeometry();
  const robberHex=assignTiles();
  assignHarbours();
  S={
    nPlayers:n,
    players:Array.from({length:n},(_,i)=>({i,resources:{wood:0,brick:0,sheep:0,wheat:0,ore:0},vp:0,
      dev:{knight:0,vp:0,road:0,plenty:0,mono:0},      // development cards currently held
      devNew:{knight:0,vp:0,road:0,plenty:0,mono:0},   // of those, bought this turn (not yet playable)
      playedKnights:0, roadLen:0})),
    buildings:{},          // vertexId -> {player,type}
    roads:{},              // edgeId -> player
    robberHex,
    phase:"setup",
    cur:0,
    hasRolled:false,
    mode:null,             // null|settlement|road|city|robber|roadBuild|setupSettlement|setupRoad
    pendingRobber:false,
    lastSetupV:null,
    dice:[null,null],
    // development deck (25): 14 Knight, 5 VP, 2 Road Building, 2 Year of Plenty, 2 Monopoly
    deck:shuffle([...Array(14).fill("knight"),...Array(5).fill("vp"),...Array(2).fill("road"),
      ...Array(2).fill("plenty"),...Array(2).fill("mono")]),
    devPlayedThisTurn:false,
    freeRoadsLeft:0,
    largestArmy:null,      // player index holding Largest Army (+2 VP)
    longestRoad:null,      // player index holding Longest Road (+2 VP)
    _stallSum:0, _stallTurns:0,   // stalemate detection for auto-play
    log:[]
  };
  // snake setup order
  const fwd=[...Array(n).keys()];
  S.setupQueue=[...fwd,...[...fwd].reverse()];
  S.setupIdx=0;
  S.settlementsPlaced=Array(n).fill(0);

  $("overlay").classList.add("hidden");
  drawStaticBoard();
  beginSetupTurn();
}

function pushLog(msg,now){ S.log.push({msg,now}); if(S.log.length>40)S.log.shift(); }

/* ---------------- Counting / rules helpers ---------------- */
function ownCount(p,type){
  if(type==="road") return Object.values(S.roads).filter(x=>x===p).length;
  return Object.values(S.buildings).filter(b=>b.player===p&&b.type===type).length;
}
function recomputeVP(){
  S.players.forEach(pl=>pl.vp=0);
  for(const vid in S.buildings){const b=S.buildings[vid];S.players[b.player].vp+=(b.type==="city"?2:1);}
  // Victory Point development cards each add 1 (silently, even the turn they were bought).
  S.players.forEach(pl=>pl.vp+=pl.dev.vp);
  // Special-award bonuses.
  if(S.largestArmy!=null) S.players[S.largestArmy].vp+=2;
  if(S.longestRoad!=null) S.players[S.longestRoad].vp+=2;
}
/* Longest continuous road for player p: the longest trail (no edge reused) along their
   connected road segments, with the path broken at any vertex holding an opponent's building. */
function longestRoadLength(p){
  const myEdges=Object.keys(S.roads).filter(eid=>S.roads[eid]===p).map(Number);
  if(myEdges.length===0) return 0;
  const adj={};
  myEdges.forEach(eid=>{
    const e=edges[eid];
    (adj[e.v1]=adj[e.v1]||[]).push({eid,to:e.v2});
    (adj[e.v2]=adj[e.v2]||[]).push({eid,to:e.v1});
  });
  const blocked=v=>{const b=S.buildings[v]; return !!(b&&b.player!==p);}; // opponent building cuts the path
  let best=0;
  const dfs=(v,len,used,first)=>{
    if(len>best) best=len;
    if(blocked(v)&&!first) return;          // a path can end at an opponent's building, but not pass through
    for(const {eid,to} of adj[v]){
      if(used.has(eid)) continue;
      used.add(eid); dfs(to,len+1,used,false); used.delete(eid);
    }
  };
  Object.keys(adj).map(Number).forEach(start=>dfs(start,0,new Set(),true));
  return best;
}
function updateLongestRoad(){
  S.players.forEach(pl=>pl.roadLen=longestRoadLength(pl.i));
  const len=i=>S.players[i].roadLen;
  const prev=S.longestRoad;
  let holder=prev;
  if(holder!=null && len(holder)<5) holder=null;     // current holder's road was cut below 5
  let maxLen=0, leaders=[];
  for(let i=0;i<S.nPlayers;i++){const L=len(i); if(L>maxLen){maxLen=L;leaders=[i];} else if(L===maxLen) leaders.push(i);}
  if(maxLen<5) holder=null;
  else if(holder==null){ if(leaders.length===1) holder=leaders[0]; }   // first to a unique 5+
  else if(len(holder)<maxLen){ if(leaders.length===1) holder=leaders[0]; } // strictly longer unique challenger
  // (a tie, or the holder still being the max, leaves the title where it is)
  if(holder!==prev){
    S.longestRoad=holder;
    if(holder==null) pushLog("Longest Road is no longer held.",true);
    else if(prev==null) pushLog(PLAYER_NAMES[holder]+" claims the Longest Road (+2 VP).",true);
    else pushLog(PLAYER_NAMES[holder]+" takes the Longest Road from "+PLAYER_NAMES[prev]+" (+2 VP).",true);
  }
}
function updateLargestArmy(){
  const p=S.cur, k=S.players[p].playedKnights;     // only the player who just played a Knight can gain it
  if(k<3) return;
  const cur=S.largestArmy;
  if(cur===p) return;
  if(cur==null){ S.largestArmy=p; pushLog(PLAYER_NAMES[p]+" claims the Largest Army (+2 VP).",true); }
  else if(k>S.players[cur].playedKnights){ S.largestArmy=p; pushLog(PLAYER_NAMES[p]+" takes the Largest Army from "+PLAYER_NAMES[cur]+" (+2 VP).",true); }
}
function totalCards(p){return RES_ORDER.reduce((s,r)=>s+S.players[p].resources[r],0);}
function canAfford(p,cost){return Object.keys(cost).every(r=>S.players[p].resources[r]>=cost[r]);}
function pay(p,cost){Object.keys(cost).forEach(r=>S.players[p].resources[r]-=cost[r]);}
function costText(cost){return Object.keys(cost).map(r=>cost[r]+" "+RES_SHORT[r].toLowerCase()).join(", ");}

/* Harbours a player can use (settlement or city on one of the harbour's vertices). */
function playerHarbours(p){
  return harbours.filter(h=>{
    const b1=S.buildings[h.v1], b2=S.buildings[h.v2];
    return (b1&&b1.player===p)||(b2&&b2.player===p);
  });
}
function harbourLabel(t){ return t==="3:1" ? "3:1" : "2:1 "+RES_SHORT[t]; }
// Best maritime rate for giving resource `res`: 4 (bank), 3 (generic harbour) or 2 (matching 2:1).
function harbourRate(p,res){
  let rate=4;
  playerHarbours(p).forEach(h=>{
    if(h.type==="3:1") rate=Math.min(rate,3);
    else if(h.type===res) rate=Math.min(rate,2);
  });
  return rate;
}

function hasOwnRoadAt(vid,p){return vertices[vid].edges.some(eid=>S.roads[eid]===p);}
function roadConnected(eid,p){
  const e=edges[eid];
  for(const v of [e.v1,e.v2]){
    const b=S.buildings[v];
    if(b&&b.player===p) return true;
    if(vertices[v].edges.some(o=>o!==eid&&S.roads[o]===p)) return true;
  }
  return false;
}
function legalSettlements(p,setup){
  return vertices.filter(v=>!S.buildings[v.id]
      && v.adj.every(n=>!S.buildings[n])
      && (setup || hasOwnRoadAt(v.id,p))).map(v=>v.id);
}
function legalRoads(p,setup,anchorV){
  return edges.filter(e=> S.roads[e.id]===undefined
      && (setup ? (e.v1===anchorV||e.v2===anchorV) : roadConnected(e.id,p))).map(e=>e.id);
}
function legalCities(p){
  return Object.keys(S.buildings).filter(v=>S.buildings[v].player===p&&S.buildings[v].type==="settlement").map(Number);
}

/* ---------------- Setup phase ---------------- */
function beginSetupTurn(){
  applyPendingMode();
  S.cur=S.setupQueue[S.setupIdx];
  S.mode="setupSettlement"; S.lastSetupV=null;
  renderAll();
}
function commitSettlement(vid){
  if(S.phase==="setup"){
    S.buildings[vid]={player:S.cur,type:"settlement"};
    S.settlementsPlaced[S.cur]++;
    if(S.settlementsPlaced[S.cur]===2){ // second settlement yields starting resources
      const got=[];
      vertices[vid].hexes.forEach(hi=>{const h=hexes[hi];if(h.resource!=="desert"){S.players[S.cur].resources[h.resource]++;got.push(RES_SHORT[h.resource]);}});
      if(got.length) pushLog(PLAYER_NAMES[S.cur]+" collects "+got.join(", ")+" from the second settlement.");
    }
    S.lastSetupV=vid; S.mode="setupRoad";
    updateLongestRoad(); recomputeVP(); renderAll();
    return;
  }
  // normal play
  pay(S.cur,COST.settlement);
  S.buildings[vid]={player:S.cur,type:"settlement"};
  pushLog(PLAYER_NAMES[S.cur]+" builds a settlement.",true);
  S.mode=null; updateLongestRoad(); recomputeVP(); checkWin(); renderAll();
}
function commitRoad(eid){
  if(S.phase==="setup"){
    S.roads[eid]=S.cur;
    updateLongestRoad();
    S.setupIdx++;
    if(S.setupIdx<S.setupQueue.length){ beginSetupTurn(); }
    else { // setup complete
      S.phase="play"; S.cur=0; S.hasRolled=false; S.mode=null;
      applyPendingMode();
      pushLog("Setup complete — let the trading begin!",true);
      renderAll();
    }
    return;
  }
  if(S.mode==="roadBuild"){           // free roads from a Road Building card
    S.roads[eid]=S.cur; S.freeRoadsLeft--;
    pushLog(PLAYER_NAMES[S.cur]+" builds a free road.",true);
    updateLongestRoad(); recomputeVP(); checkWin();
    if(S.phase==="over"){ S.mode=null; renderAll(); return; }
    if(!(S.freeRoadsLeft>0 && ownCount(S.cur,"road")<LIMIT.road && legalRoads(S.cur,false,null).length>0)) S.mode=null;
    renderAll();
    return;
  }
  pay(S.cur,COST.road);
  S.roads[eid]=S.cur;
  pushLog(PLAYER_NAMES[S.cur]+" builds a road.",true);
  S.mode=null; updateLongestRoad(); recomputeVP(); checkWin(); renderAll();
}
function commitCity(vid){
  pay(S.cur,COST.city);
  S.buildings[vid].type="city";
  pushLog(PLAYER_NAMES[S.cur]+" upgrades to a city.",true);
  S.mode=null; recomputeVP(); checkWin(); renderAll();
}
function commitRobber(hi){
  S.robberHex=hi; S.mode=null;
  // Opponents with a settlement or city touching the new hex are eligible to be robbed.
  const victims=[...new Set(hexes[hi].corners.map(v=>S.buildings[v]).filter(b=>b&&b.player!==S.cur).map(b=>b.player))];
  if(victims.length<=1){
    finishRobber(victims[0]);           // undefined → nobody to steal from
  } else if(isBot(S.cur)){
    finishRobber(botPickStealTarget(victims));   // a bot resolves the choice itself
  } else {
    // More than one rival borders the hex — let the current player pick.
    S.stealChoices=victims; renderAll(); openSteal();
  }
}
function finishRobber(victim){
  S.pendingRobber=false; S.mode=null; S.stealChoices=null;
  if(victim==null){
    pushLog(PLAYER_NAMES[S.cur]+" moves the robber. No one to steal from here.",true);
  } else {
    const pool=[]; RES_ORDER.forEach(r=>{for(let k=0;k<S.players[victim].resources[r];k++)pool.push(r);});
    if(pool.length===0){
      pushLog(PLAYER_NAMES[S.cur]+" moves the robber, but "+PLAYER_NAMES[victim]+" has no cards to steal.",true);
    } else {
      const r=pool[Math.floor(Math.random()*pool.length)];
      S.players[victim].resources[r]--; S.players[S.cur].resources[r]++;
      pushLog(PLAYER_NAMES[S.cur]+" moves the robber and steals 1 "+RES_SHORT[r].toLowerCase()+" from "+PLAYER_NAMES[victim]+".",true);
    }
  }
  renderAll();
}

/* ---------------- Turn actions ---------------- */
function rollDice(){
  if(S.phase!=="play"||S.hasRolled) return;
  const d1=1+Math.floor(Math.random()*6), d2=1+Math.floor(Math.random()*6);
  S.dice=[d1,d2]; S.hasRolled=true;
  const sum=d1+d2;
  if(sum===7){
    // A 7: first everyone over the hand limit discards, THEN the robber moves.
    S.pendingRobber=true; S.mode=null;
    pushLog(PLAYER_NAMES[S.cur]+" rolled a 7.",true);
    const order=[];
    for(let k=0;k<S.nPlayers;k++){const pi=(S.cur+k)%S.nPlayers; if(totalCards(pi)>7) order.push(pi);}
    if(order.length){
      S.discardQueue=order; S.discardIdx=0;
      renderAll();
      advanceDiscards();
      return;
    }
    S.mode="robber";
    pushLog(PLAYER_NAMES[S.cur]+" — move the robber.",true);
  } else {
    const gains={}; // player -> {res:amount}
    hexes.forEach((h,hi)=>{
      if(h.number!==sum||hi===S.robberHex||h.resource==="desert") return;
      h.corners.forEach(v=>{const b=S.buildings[v];
        if(b){const amt=b.type==="city"?2:1; S.players[b.player].resources[h.resource]+=amt;
          gains[b.player]=gains[b.player]||{}; gains[b.player][h.resource]=(gains[b.player][h.resource]||0)+amt;}});
    });
    const parts=Object.keys(gains).map(p=>PLAYER_NAMES[p]+" +"+Object.keys(gains[p]).map(r=>gains[p][r]+RES_SHORT[r][0]).join(""));
    pushLog("Rolled "+sum+(parts.length?" — "+parts.join(", "):" — no production."),true);
  }
  renderAll();
}
function endTurn(){
  if(S.phase!=="play"||!S.hasRolled||S.pendingRobber||S.mode==="robber"||S.mode==="roadBuild") return;
  // Cards bought this turn become playable from the next turn onward.
  S.players[S.cur].devNew={knight:0,vp:0,road:0,plenty:0,mono:0};
  S.cur=(S.cur+1)%S.nPlayers; S.hasRolled=false; S.mode=null; S.dice=[null,null];
  S.devPlayedThisTurn=false;
  applyPendingMode();
  // Stalemate guard: if total VP hasn't risen for many turns, an auto-play game can't progress — end it.
  const sum=S.players.reduce((s,pl)=>s+pl.vp,0);
  if(sum>S._stallSum){ S._stallSum=sum; S._stallTurns=0; }
  else { S._stallTurns++; if(S._stallTurns>=STALL_LIMIT && isBot(S.cur)){ declareStalemate(); } }
  renderAll();
}
function declareStalemate(){
  let w=0,bv=-1;
  S.players.forEach(p=>{ const v=p.vp*1000+totalCards(p.i); if(v>bv){bv=v;w=p.i;} });
  S.phase="over"; S.winner=w; S.mode=null; S.pendingRobber=false;
  pushLog("Stalemate — the board is locked and no one can reach 10. "+PLAYER_NAMES[w]+" wins on points ("+S.players[w].vp+" VP).",true);
}
function checkWin(){
  if(S.phase==="over") return;
  if(S.players[S.cur].vp>=10){
    S.phase="over"; S.winner=S.cur; S.mode=null;
    const vpc=S.players[S.cur].dev.vp;
    pushLog(PLAYER_NAMES[S.cur]+" reaches "+S.players[S.cur].vp+" VP and wins!"+
      (vpc?` Reveals ${vpc} Victory Point card${vpc>1?"s":""}.`:""),true);
  }
}
// True when the current player may take a turn action (buy/play dev, build, trade).
function canActNow(){ return S.phase==="play"&&S.hasRolled&&!S.pendingRobber&&S.mode!=="robber"&&S.mode!=="roadBuild"; }

/* ---------------- Mode entry from buttons ---------------- */
function tryMode(type){
  if(S.phase!=="play"||!S.hasRolled||S.pendingRobber){return;}
  if(S.mode===type){ S.mode=null; renderAll(); return; } // toggle off
  const p=S.cur;
  if(!canAfford(p,COST[type])){ flash("Not enough resources — a "+type+" costs "+costText(COST[type])+"."); return; }
  let legal;
  if(type==="settlement"){ if(ownCount(p,"settlement")>=LIMIT.settlement){flash("You've placed all 5 settlements.");return;} legal=legalSettlements(p,false); }
  else if(type==="road"){ if(ownCount(p,"road")>=LIMIT.road){flash("You've placed all 15 roads.");return;} legal=legalRoads(p,false,null); }
  else if(type==="city"){ if(ownCount(p,"city")>=LIMIT.city){flash("You've built all 4 cities.");return;} legal=legalCities(p); }
  if(legal.length===0){ flash(type==="city"?"No settlement of yours to upgrade.":"No legal spot for a "+type+" right now."); return; }
  S.mode=type; renderAll();
}

function drawHarbours(g){
  harbours.forEach(h=>{
    const a=vertices[h.v1], b=vertices[h.v2];

      ["stroke-width"]:2.2,["stroke-linecap"]:"round"},g));

        ["font-family"]:"'Outfit',sans-serif",["font-weight"]:600,["font-size"]:6,
        ["letter-spacing"]:"0.4px",fill:dark?"#2c2117":"#fff"},g).textContent=RES_SHORT[h.type].toUpperCase();

function drawCompass(g,cx,cy,r){
  // 8-point star
  const pts=[];
  for(let k=0;k<8;k++){const ang=(k*45-90)*Math.PI/180;const rr=(k%2===0)?r:r*0.4;pts.push((cx+rr*Math.cos(ang))+","+(cy+rr*Math.sin(ang)));}
  el("polygon",{points:pts.join(" "),fill:"rgba(224,184,74,.12)",stroke:"rgba(224,184,74,.45)",["stroke-width"]:1},g);
  el("circle",{cx,cy,r:r*0.16,fill:"rgba(224,184,74,.5)"},g);
  el("text",{x:cx,y:cy-r-7},g).textContent="N";
  el("text",{x:cx,y:cy+r+7},g).textContent="S";
  el("text",{x:cx+r+8,y:cy},g).textContent="E";
  el("text",{x:cx-r-8,y:cy},g).textContent="W";
}

function tradeRespond(accept){
  const p=S.cur, q=TRADE.partner;
  if(!accept){ pushLog(PLAYER_NAMES[q]+" declines "+PLAYER_NAMES[p]+"'s offer."); closeTrade(); return; }
  const giveOk=RES_ORDER.every(r=>S.players[p].resources[r]>=TRADE.give[r]);
  const recvOk=RES_ORDER.every(r=>S.players[q].resources[r]>=TRADE.receive[r]);
  if(!giveOk||!recvOk){ pushLog("Trade failed — the resources are no longer available.",true); closeTrade(); return; }
  RES_ORDER.forEach(r=>{
    S.players[p].resources[r]-=TRADE.give[r]; S.players[q].resources[r]+=TRADE.give[r];
    S.players[q].resources[r]-=TRADE.receive[r]; S.players[p].resources[r]+=TRADE.receive[r];
  });
  pushLog(PLAYER_NAMES[p]+" and "+PLAYER_NAMES[q]+" trade — "+PLAYER_NAMES[p]+" gives "+resList(TRADE.give)+", gets "+resList(TRADE.receive)+".",true);
  closeTrade();
}

function discardHTML(){

  const steppers=`<div class="steppers">`+RES_ORDER.map(r=>{

        <span class="st-val">${val}</span>
        <button ${(val>=max||atTotal)?"disabled":""} onclick="discardAdjust('${r}',1)">+</button>
      </div><div class="st-max">/ ${max}</div></div>`;
  }).join("")+`</div>`;
  const ready=selSum===DISCARD.need;
  return `
    <div class="trade-head"><h2>Discard cards</h2><span class="trade-who">${PLAYER_NAMES[p]}</span></div>

    <div class="trade-block"><div class="tb-lab">Choose cards to discard</div>${steppers}</div>
    <div class="trade-foot">
      <button class="btn primary" ${ready?"":"disabled"} onclick="confirmDiscard()">Discard ${DISCARD.need}</button>
    </div>`;
}
function discardAdjust(r,delta){
  const p=DISCARD.player, max=S.players[p].resources[r];
  const selSum=RES_ORDER.reduce((s,x)=>s+DISCARD.sel[x],0);
  if(delta>0 && selSum>=DISCARD.need) return;     // can't pick more than required
  DISCARD.sel[r]=Math.max(0,Math.min(max,DISCARD.sel[r]+delta));
  renderDiscard();
}
function confirmDiscard(){
  const p=DISCARD.player;
  const selSum=RES_ORDER.reduce((s,r)=>s+DISCARD.sel[r],0);
  if(selSum!==DISCARD.need) return;
  RES_ORDER.forEach(r=>{ S.players[p].resources[r]-=DISCARD.sel[r]; });
  pushLog(PLAYER_NAMES[p]+" discards "+DISCARD.need+" card"+(DISCARD.need===1?"":"s")+".",true);
  DISCARD=null; S.discardIdx++;
  advanceDiscards();
}
/* Walk the discard queue: bots discard automatically, humans get the dialog.
   When everyone is done, the robber moves. */
function advanceDiscards(){
  while(S.discardQueue && S.discardIdx<S.discardQueue.length){
    const p=S.discardQueue[S.discardIdx];
    if(totalCards(p)<=7){ S.discardIdx++; continue; }
    if(isBot(p)){ botDiscard(p); S.discardIdx++; continue; }
    openDiscard(); return;                     // human: wait for confirmDiscard()
  }
  S.discardQueue=null; S.discardIdx=0;
  DISCARD=null; $("discardOverlay").classList.add("hidden");
  S.mode="robber";
  pushLog(PLAYER_NAMES[S.cur]+" — move the robber.",true);
  renderAll();
}

/* ================= COMPUTER PLAYERS (BOTS) ================= */
let PLAYER_TYPES=[];          // per-seat "human" | "bot"
let watchMode=false;          // global Auto / watch — every seat is bot-controlled
let watchPendingOff=false;    // user asked to return to Manual at the next turn boundary
let paused=false;             // freeze auto-play
let speedMs=550;              // delay between bot actions
let botTimer=null;

const ROAD_TARGET_MIN=6;      // only build roads toward genuinely good future settlement spots
const STALL_LIMIT=50;         // turns of zero VP progress before a stalemate is called (auto-play safety)
const SETTLE_MIN=0;           // don't take 1-hex / 2-&-12 corners except in the opening
const TRADE_GAP_MAX=2;        // only bank/harbour-trade to finish a build we're this close to

function isBot(p){ return watchMode || PLAYER_TYPES[p]==="bot"; }
function anyBots(){ return watchMode || PLAYER_TYPES.some(t=>t==="bot"); }
function applyPendingMode(){          // called at each turn boundary
  if(watchPendingOff){ watchPendingOff=false; if(watchMode){ watchMode=false; pushLog("Manual control resumed.",true); } }
}
function setWatch(on){
  if(on){
    watchMode=true; watchPendingOff=false; paused=false;
    if(S && (S.mode==="settlement"||S.mode==="road"||S.mode==="city")) S.mode=null;   // drop a dangling human placement
    pushLog("Auto-play on — watching the bots.",true);
  } else if(watchMode){
    watchPendingOff=true;             // hand back to humans at the next turn
  }
  renderAll();
}
function togglePause(){ paused=!paused; renderAll(); }
function renderAutoBar(){
  if(!S) return;
  $("modeAuto").classList.toggle("sel",watchMode);
  $("modeManual").classList.toggle("sel",!watchMode);
  $("pauseBtn").textContent=paused?"Resume":"Pause";
  $("pauseBtn").classList.toggle("sel",paused);
  document.querySelectorAll(".spd").forEach(b=>b.classList.toggle("sel",+b.dataset.ms===speedMs));
  let st="";
  if(paused) st="⏸ Paused.";
  else if(watchMode) st=watchPendingOff?"Watching — will hand back to Manual next turn.":"Watching — bots control every seat.";
  else st=anyBots()?"Manual — humans play by hand; bot seats auto-play.":"Manual — all seats are human.";
  $("autoStatus").textContent=st;
}

/* ---- scheduler: one visible bot action per tick; always terminates ---- */
function botActive(){
  if(!S || S.phase==="over" || paused) return false;
  if(DISCARD||TRADE||DEV||S.stealChoices) return false;   // a human dialog is resolving
  if(S.phase==="setup"||S.phase==="play") return isBot(S.cur);
  return false;
}
function scheduleBot(){
  clearTimeout(botTimer);
  if(botActive()) botTimer=setTimeout(runBotTick, speedMs);
}
function runBotTick(){
  if(!botActive()) return;
  try{ botTickOnce(); }
  catch(err){
    console.error("Bot error — ending the turn safely.",err);
    if(S){ S.mode=null; S.pendingRobber=false; S.stealChoices=null; S.discardQueue=null;
      if(S.phase==="play"){ try{ endTurn(); }catch(e){ S.cur=(S.cur+1)%S.nPlayers; S.hasRolled=false; S.devPlayedThisTurn=false; renderAll(); } } }
  }
  scheduleBot();
}
function botTickOnce(){
  if(S.phase==="setup"){ botSetup(); return; }
  if(S.phase!=="play") return;
  if(S.mode==="robber"){ botMoveRobber(); return; }
  if(S.mode==="roadBuild"){ botPlaceFreeRoad(); return; }
  if(S.pendingRobber) return;                  // waiting on a human discard
  if(!S.hasRolled){ rollDice(); return; }
  if(botDoOneBuildOrPlay()) return;
  endTurn();                                   // nothing useful left — always end
}

/* ---- placement scoring (used everywhere a bot picks a spot) ---- */
function pips(n){ return (n==null)?0:6-Math.abs(7-n); }
function harbourAt(vid){ return harbours.find(h=>h.v1===vid||h.v2===vid)||null; }
function playerCoverage(p){
  const res=new Set(), nums=new Set();
  for(const vid in S.buildings){ const b=S.buildings[vid]; if(b.player!==p) continue;
    vertices[vid].hexes.forEach(hi=>{const h=hexes[hi]; if(h.resource!=="desert"&&h.number!=null){res.add(h.resource);nums.add(h.number);}}); }
  return {res,nums};
}
function spotScore(vid,p){
  const prod=vertices[vid].hexes.map(hi=>hexes[hi]).filter(h=>h.resource!=="desert"&&h.number!=null);
  const k=prod.length;
  if(k===0) return -100;                                   // pure coast / desert corner
  let score=prod.reduce((s,h)=>s+pips(h.number),0);        // base = sum of pips
  if(k>=3) score+=6; else if(k===2) score-=4; else score-=10;          // strongly favour 3-hex spots
  if(prod.every(h=>h.number===2||h.number===12)) score-=50;            // 2/12-only ≈ worthless
  prod.forEach(h=>{ if(h.number===6||h.number===8) score+=2; });       // bonus for the best numbers
  const cov=playerCoverage(p);
  prod.forEach(h=>{ if(!cov.res.has(h.resource)) score+=2; if(!cov.nums.has(h.number)) score+=1; });  // diversity
  const hb=harbourAt(vid);
  if(hb){ if(hb.type==="3:1") score+=1;
    else score+=(prod.some(h=>h.resource===hb.type)||cov.res.has(hb.type))?3:1; }                     // 2:1 you can feed
  return score;
}
function argmaxVid(list,fn){ let best=null,bv=-1e9; list.forEach(v=>{const s=fn(v); if(s>bv){bv=s;best=v;}}); return best; }
function botMySettlements(p){ return Object.keys(S.buildings).filter(v=>S.buildings[v].player===p&&S.buildings[v].type==="settlement").map(Number); }
function botBestSpot(list,p){ return argmaxVid(list,v=>spotScore(v,p)); }

/* ---- opening placement ---- */
function botSetup(){
  const p=S.cur;
  if(S.mode==="setupSettlement"){
    const cands=legalSettlements(p,true);
    const vid=argmaxVid(cands,v=>spotScore(v,p));
    commitSettlement(vid==null?cands[0]:vid);
  } else if(S.mode==="setupRoad"){
    commitRoad(botPickSetupRoad(p,S.lastSetupV));
  }
}
function botPickSetupRoad(p,anchor){
  const legal=legalRoads(p,true,anchor);
  if(legal.length===0) return null;
  let best=legal[0],bv=-1e9;
  legal.forEach(eid=>{
    const e=edges[eid], far=(e.v1===anchor)?e.v2:e.v1;
    let s=spotScore(far,p), look=-1e9;
    vertices[far].adj.forEach(nb=>{ if(nb!==anchor && !S.buildings[nb]) look=Math.max(look,spotScore(nb,p)); });
    s+=Math.max(0,look)*0.5;                       // also value where it lets us reach next
    if(s>bv){bv=s;best=eid;}
  });
  return best;
}

/* ---- robber / steal / discard ---- */
function leaderOf(exclude){
  let best=-1,bv=-1;
  S.players.forEach(pl=>{ if(pl.i===exclude) return; const v=pl.vp*100+totalCards(pl.i); if(v>bv){bv=v;best=pl.i;} });
  return best;
}
function botPickStealTarget(victims){
  const leader=leaderOf(S.cur);
  let best=victims[0],bv=-1;
  victims.forEach(v=>{ const s=totalCards(v)+(v===leader?100:0); if(s>bv){bv=s;best=v;} });
  return best;
}
function botRobberHasTarget(p){
  return hexes.some((h,hi)=> hi!==S.robberHex
    && !h.corners.some(v=>S.buildings[v]&&S.buildings[v].player===p)
    && h.corners.some(v=>S.buildings[v]&&S.buildings[v].player!==p));
}
function botMoveRobber(){
  const me=S.cur, leader=leaderOf(me);
  const touchesSelf=hi=>hexes[hi].corners.some(v=>S.buildings[v]&&S.buildings[v].player===me);
  let best=null,bestScore=-1;
  hexes.forEach((h,hi)=>{
    if(hi===S.robberHex||touchesSelf(hi)) return;
    let sc=0, opp=false;
    h.corners.forEach(v=>{const b=S.buildings[v]; if(b&&b.player!==me){ opp=true; sc+=(b.type==="city"?2:1)*pips(h.number); if(b.player===leader) sc+=10; }});
    if(!opp) return;
    if(sc>bestScore){bestScore=sc;best=hi;}
  });
  if(best==null){                                  // fallback: any hex not on our own land
    for(let hi=0;hi<hexes.length;hi++){ if(hi!==S.robberHex&&!touchesSelf(hi)){ best=hi; break; } }
    if(best==null) best=(S.robberHex+1)%hexes.length;
  }
  commitRobber(best);
}
function botDiscard(p){
  const need=Math.floor(totalCards(p)/2);
  const keepW={wheat:3,ore:3,brick:2,wood:2,sheep:1};   // hang on to city/build resources, dump sheep first
  for(let i=0;i<need;i++){
    let pick=null,best=-1e9;
    RES_ORDER.forEach(r=>{ if(S.players[p].resources[r]>0){ const v=S.players[p].resources[r]*2-keepW[r]; if(v>best){best=v;pick=r;} }});
    if(pick) S.players[p].resources[pick]--;
  }
  pushLog(PLAYER_NAMES[p]+" discards "+need+" card"+(need===1?"":"s")+".",true);
}

/* ---- build / trade / dev priority ---- */
function botDoOneBuildOrPlay(){
  const p=S.cur;
  if(!S.devPlayedThisTurn && botMaybePlayDev()) return true;
  // 1. claim a new settlement on the best legal spot (board space is contested — grab it first)
  if(ownCount(p,"settlement")<LIMIT.settlement){
    const spots=legalSettlements(p,false).filter(v=>spotScore(v,p)>=SETTLE_MIN);
    if(spots.length){
      if(canAfford(p,COST.settlement)){ commitSettlement(botBestSpot(spots,p)); return true; }
      if(botTradeFor(COST.settlement)) return true;
    }
  }
  // 2. upgrade the best settlement to a city
  if(ownCount(p,"city")<LIMIT.city){
    const setts=botMySettlements(p);
    if(setts.length){
      if(canAfford(p,COST.city)){ commitCity(botBestSpot(setts,p)); return true; }
      if(botTradeFor(COST.city)) return true;
    }
  }
  // 3. build a road toward the best reachable open spot
  if(ownCount(p,"road")<LIMIT.road){
    const eid=botBestRoad(p);
    if(eid!=null){
      if(canAfford(p,COST.road)){ commitRoad(eid); return true; }
      if(botTradeFor(COST.road)) return true;
    }
  }
  // 4. spend the spare on a development card
  if(S.deck.length>0 && canAfford(p,COST.dev)){ buyDev(); return true; }
  return false;
}
function botBestRoad(p){
  if(ownCount(p,"road")>=LIMIT.road) return null;
  const dist=new Array(vertices.length).fill(Infinity);
  const firstEdge=new Array(vertices.length).fill(-1);
  const q=[];
  const inNet=v=>{ const b=S.buildings[v]; if(b&&b.player===p) return true; return vertices[v].edges.some(e=>S.roads[e]===p); };
  vertices.forEach(v=>{ if(inNet(v.id)){ dist[v.id]=0; q.push(v.id); } });
  for(let head=0;head<q.length;head++){            // multi-source BFS over still-empty edges
    const v=q[head], b=S.buildings[v];
    if(b&&b.player!==p) continue;                  // can't extend through an opponent's building
    vertices[v].edges.forEach(eid=>{
      if(S.roads[eid]!==undefined) return;         // edge already has a road
      const e=edges[eid], u=(e.v1===v)?e.v2:e.v1;
      if(dist[u]>dist[v]+1){
        dist[u]=dist[v]+1;
        firstEdge[u]=(dist[v]===0)?eid:firstEdge[v];
        q.push(u);
      }
    });
  }
  let bestV=-1,bestVal=-1e9;
  vertices.forEach(v=>{
    const id=v.id;
    if(dist[id]<1||dist[id]>4||!isFinite(dist[id])) return;
    if(S.buildings[id]||!v.adj.every(nb=>!S.buildings[nb])) return;     // occupied or distance-rule blocked
    const sc=spotScore(id,p);
    if(sc<ROAD_TARGET_MIN) return;
    const val=sc-dist[id]*3;                        // prefer high value, nearby
    if(val>bestVal){bestVal=val;bestV=id;}
  });
  if(bestV>=0){ const fe=firstEdge[bestV]; if(fe>=0 && S.roads[fe]===undefined) return fe; }
  return null;
}
function botPlaceFreeRoad(){
  let eid=botBestRoad(S.cur);
  if(eid==null){
    const legal=legalRoads(S.cur,false,null);
    if(legal.length===0){ S.mode=null; S.freeRoadsLeft=0; renderAll(); return; }
    eid=legal[0];
  }
  commitRoad(eid);                                 // handles freeRoadsLeft and exiting the mode
}
function botTradeFor(cost){
  const p=S.cur, need={}; let totalNeed=0;
  Object.keys(cost).forEach(r=>{ const d=cost[r]-S.players[p].resources[r]; if(d>0){need[r]=d; totalNeed+=d;} });
  if(totalNeed===0||totalNeed>TRADE_GAP_MAX) return false;
  let give=null,rate=99;
  RES_ORDER.forEach(r=>{ if(need[r]) return; const rt=harbourRate(p,r), surplus=S.players[p].resources[r]-(cost[r]||0);
    if(surplus>=rt && rt<rate){ rate=rt; give=r; } });
  if(give==null) return false;
  const recv=Object.keys(need)[0];
  S.players[p].resources[give]-=rate; S.players[p].resources[recv]+=1;
  pushLog(PLAYER_NAMES[p]+" trades "+rate+" "+RES_SHORT[give].toLowerCase()+" for 1 "+RES_SHORT[recv].toLowerCase()+(rate<4?" at a harbour.":" with the bank."),true);
  return true;
}
function botMaybePlayDev(){
  const p=S.cur, d=S.players[p].dev, nw=S.players[p].devNew;
  const have=t=>(d[t]-nw[t])>0;
  if(have("knight")){
    const leader=leaderOf(p);
    const robberOnMe=hexes[S.robberHex].corners.some(v=>S.buildings[v]&&S.buildings[v].player===p);
    const leaderAhead=leader>=0 && S.players[leader].vp>=S.players[p].vp;
    const nextK=S.players[p].playedKnights+1;
    const chaseArmy=nextK>=3 && (S.largestArmy==null || (S.largestArmy!==p && nextK>S.players[S.largestArmy].playedKnights));
    if(botRobberHasTarget(p) && (robberOnMe||leaderAhead||chaseArmy)){ devPlayKnight(); return true; }
  }
  if(have("mono")){
    const best=botMonopolyBest(p);
    if(best && best.total>=4){ playBotMonopoly(best.res); return true; }
  }
  if(have("plenty")){
    const pick=botPlentyPick(p);
    if(pick){ playBotPlenty(pick); return true; }
  }
  if(have("road") && ownCount(p,"road")<LIMIT.road && botBestRoad(p)!=null){ devPlayRoad(); return true; }
  return false;
}
function botMonopolyBest(p){
  let best=null;
  RES_ORDER.forEach(r=>{ let t=0; for(let i=0;i<S.nPlayers;i++){ if(i!==p) t+=S.players[i].resources[r]; }
    if(!best||t>best.total) best={res:r,total:t}; });
  return best;
}
function botPlentyPick(p){
  const targets=[];
  if(ownCount(p,"city")<LIMIT.city && botMySettlements(p).length) targets.push(COST.city);
  if(ownCount(p,"settlement")<LIMIT.settlement && legalSettlements(p,false).some(v=>spotScore(v,p)>=SETTLE_MIN)) targets.push(COST.settlement);
  if(ownCount(p,"road")<LIMIT.road && botBestRoad(p)!=null) targets.push(COST.road);
  for(const cost of targets){
    const need=[]; Object.keys(cost).forEach(r=>{ let dlt=cost[r]-S.players[p].resources[r]; while(dlt-->0) need.push(r); });
    if(need.length>=1 && need.length<=2){ while(need.length<2) need.push("ore"); return need.slice(0,2); }
  }
  return null;
}
function playBotPlenty(two){
  const p=S.cur;
  two.forEach(r=>S.players[p].resources[r]++);
  S.players[p].dev.plenty--; S.devPlayedThisTurn=true;
  const tally=zeroRes(); two.forEach(r=>tally[r]++);
  pushLog(PLAYER_NAMES[p]+" plays Year of Plenty and takes "+resList(tally)+".",true);
  recomputeVP(); renderAll();
}
function playBotMonopoly(res){
  const p=S.cur; let total=0;
  for(let i=0;i<S.nPlayers;i++){ if(i===p) continue; total+=S.players[i].resources[res]; S.players[i].resources[res]=0; }
  S.players[p].resources[res]+=total;
  S.players[p].dev.mono--; S.devPlayedThisTurn=true;
  pushLog(PLAYER_NAMES[p]+" plays Monopoly on "+RES_SHORT[res].toLowerCase()+" — collects "+total+" card"+(total===1?"":"s")+".",true);
  recomputeVP(); renderAll();
}

/* ---------------- Init ---------------- */
$("newGameBtn").addEventListener("click",()=>{clearTimeout(botTimer);renderSetup();$("overlay").classList.remove("hidden");});
$("modeManual").addEventListener("click",()=>setWatch(false));
$("modeAuto").addEventListener("click",()=>setWatch(true));
$("pauseBtn").addEventListener("click",togglePause);
document.querySelectorAll(".spd").forEach(b=>b.addEventListener("click",()=>{ speedMs=+b.dataset.ms; renderAutoBar(); scheduleBot(); }));
buildGeometry();
// draw an idle board behind the start overlay
assignTiles();
assignHarbours();
drawStaticBoard();
renderSetup();
</script>
